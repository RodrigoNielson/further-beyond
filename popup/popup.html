<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Further Beyond</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-icon">&#9670;</div>
      <h1 class="header-title">Further Beyond</h1>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="dice" role="tab" aria-selected="true">
        <span class="tab-icon">&#9680;</span> Dice
      </button>
      <button class="tab-btn" data-tab="conditions" role="tab" aria-selected="false">
        <span class="tab-icon">&#9888;</span> Conditions
      </button>
      <button class="tab-btn" data-tab="spellslots" role="tab" aria-selected="false">
        <span class="tab-icon">&#10024;</span> Spell Slots
      </button>
    </nav>

    <!-- Dice Roller Tab -->
    <section id="tab-dice" class="tab-panel active" role="tabpanel">
      <div class="dice-grid">
        <button class="die-btn" data-sides="4">d4</button>
        <button class="die-btn" data-sides="6">d6</button>
        <button class="die-btn" data-sides="8">d8</button>
        <button class="die-btn" data-sides="10">d10</button>
        <button class="die-btn" data-sides="12">d12</button>
        <button class="die-btn highlight" data-sides="20">d20</button>
        <button class="die-btn" data-sides="100">d%</button>
      </div>

      <div class="dice-config">
        <label class="config-label">
          Count
          <input type="number" id="dice-count" class="config-input" value="1" min="1" max="20" />
        </label>
        <label class="config-label">
          Modifier
          <input type="number" id="dice-modifier" class="config-input" value="0" min="-20" max="20" />
        </label>
      </div>

      <div id="roll-result" class="roll-result hidden">
        <span id="result-expression" class="result-expression"></span>
        <span id="result-total" class="result-total"></span>
        <span id="result-breakdown" class="result-breakdown"></span>
      </div>

      <div class="history-section">
        <div class="history-header">
          <span class="history-title">Roll History</span>
          <button id="clear-history" class="btn-small">Clear</button>
        </div>
        <ul id="roll-history" class="roll-history"></ul>
      </div>
    </section>

    <!-- Conditions Tab -->
    <section id="tab-conditions" class="tab-panel" role="tabpanel">
      <p class="tab-description">Track active conditions for your character.</p>
      <div class="conditions-grid" id="conditions-grid">
        <!-- Populated by JS -->
      </div>
      <button id="clear-conditions" class="btn-secondary">Clear All Conditions</button>
    </section>

    <!-- Spell Slots Tab -->
    <section id="tab-spellslots" class="tab-panel" role="tabpanel">
      <p class="tab-description">Track your spell slots by level.</p>
      <div id="spell-slots-list" class="spell-slots-list">
        <!-- Populated by JS -->
      </div>
      <button id="reset-slots" class="btn-secondary">Reset All Slots</button>
    </section>
  </div>

  <script src="../shared/utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
